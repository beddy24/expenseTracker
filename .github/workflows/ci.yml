name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparer le nom de l'image en minuscules
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Construire l'image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \

      - name: Test de démarrage (smoke test)
        run: |
          docker run -d --name smoke -p 5000:5000 ${{ env.IMAGE }}:latest
          sleep 5
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ping)
          echo "Code HTTP reçu : $code"
          if [ "$code" != "404" ]; then
            echo "❌ Le serveur n'a pas démarré correctement"
            docker logs smoke
            docker rm -f smoke
            exit 1
          fi
          docker rm -f smoke
          echo "✅ Le conteneur démarre et répond"

      - name: Pousser l'image vers le registre
        run: docker push ${{ env.IMAGE }}:latest